name: Generate Sitemap

on:
  schedule:
    - cron: '0 6 * * *'   # Daily at 6am UTC (2am EST / 1am EDT)
  workflow_dispatch:        # Lets you trigger manually from GitHub UI anytime

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Check secrets are set
        run: |
          if [ -z "$SUPABASE_URL" ]; then echo "❌ SUPABASE_URL is not set"; exit 1; fi
          if [ -z "$SUPABASE_KEY" ]; then echo "❌ SUPABASE_KEY is not set"; exit 1; fi
          echo "✅ Secrets are configured"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Generate sitemap.xml
        run: node scripts/generate.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          cname: listings.getsetsold.ca
